<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPAA District 17 | Alcoholics Anonymous</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .hero-bg { background: linear-gradient(180deg, #001a33 0%, #000d1a 100%); position: relative; overflow: hidden; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 4s infinite alternate; }
        @keyframes twinkle { 0% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50">

    <!-- NAVBAR -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="https://i.imgur.com/0vO5v9k.png" alt="Logo" class="w-14 h-14">
                <div>
                    <h1 class="text-2xl font-bold text-[#003366]">UPAA District 17</h1>
                    <p class="text-xs text-slate-500">Upper Peninsula • Area 74</p>
                </div>
            </div>
            <div class="flex gap-6 text-sm font-medium">
                <a href="#meetings" class="hover:text-[#003366]">Meetings</a>
                <a href="minutes.html" class="hover:text-[#003366]">Minutes</a>
                <a href="#contact" class="hover:text-[#003366]">Contact</a>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <header class="hero-bg h-screen flex items-center text-white text-center relative">
        <div id="stars" class="absolute inset-0"></div>
        <div class="max-w-4xl mx-auto px-6 relative z-10">
            <h1 class="text-6xl font-bold mb-4">UPAA DISTRICT 17</h1>
            <p class="text-2xl mb-8">Alcoholics Anonymous</p>
            <p class="text-xl">24/7 Helpline: <a href="tel:906-774-0900" class="underline">906-774-0900</a></p>
        </div>
    </header>

    <!-- MEETINGS -->
    <section id="meetings" class="py-16 bg-white">
        <div class="max-w-6xl mx-auto px-6">
            <h2 class="text-4xl font-bold text-center text-[#003366] mb-12">Meeting Schedule</h2>
            <!-- I'll add the full schedule if you want, but for now a placeholder -->
            <div class="text-center">
                <a href="#" class="text-lg underline">Full Meeting Schedule Coming Soon</a>
            </div>
        </div>
    </section>

    <!-- CONTACT -->
    <section id="contact" class="py-20 bg-slate-900 text-white">
        <div class="max-w-2xl mx-auto px-6 text-center">
            <h2 class="text-4xl font-bold mb-4">Contact the Webmaster</h2>
            <p class="mb-8">upaa.district17@gmail.com</p>
            
            <form action="https://formsubmit.co/upaa.district17@gmail.com" method="POST" class="space-y-6">
                <input type="text" name="name" placeholder="Name" required class="w-full p-4 rounded-xl">
                <input type="email" name="email" placeholder="Your Email" required class="w-full p-4 rounded-xl">
                <textarea name="message" rows="5" placeholder="Message or announcement" required class="w-full p-4 rounded-xl"></textarea>
                <button type="submit" class="w-full bg-white text-slate-900 py-4 rounded-xl font-semibold">Send Message</button>
            </form>
        </div>
    </section>

    <script>
        // Simple stars
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = star.style.height = Math.random() * 3 + 'px';
            starsContainer.appendChild(star);
        }
    </script>
</body>
</html>
